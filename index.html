<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .tiktok-loader { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #2af0ea; border-top: 3px solid #fe2c55; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #v, #c { display: none; }
        .load-text { margin-top: 15px; font-size: 14px; color: #888; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .progress-bar { width: 200px; height: 3px; background: #222; border-radius: 2px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2af0ea, #fe2c55); border-radius: 2px; animation: progress 10s ease-in-out forwards; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body>
    <div class="tiktok-loader"></div>
    <p class="load-text" id="statusText">Loading video...</p>
    <div class="progress-bar"><div class="progress-fill"></div></div>
